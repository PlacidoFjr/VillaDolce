<svg xmlns="http://www.w3.org/2000/svg" width="1080" height="1080" viewBox="0 0 1080 1080">
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#fbf4e9"/>
      <stop offset="55%" stop-color="#f5eadb"/>
      <stop offset="100%" stop-color="#efe0cd"/>
    </linearGradient>
    <filter id="softShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#4a2f20" flood-opacity="0.16"/>
    </filter>
    <style>
      .serif {
        font-family: "Didot", "Bodoni 72", "Playfair Display", Georgia, serif;
      }
      .sans {
        font-family: "Montserrat", "Avenir", Arial, sans-serif;
      }
      .script {
        font-family: "Great Vibes", "Snell Roundhand", "Brush Script MT", cursive;
      }
      .brown {
        fill: #3c2619;
      }
      .gold {
        fill: #9b7545;
      }
      .line {
        stroke: #9b7545;
        stroke-width: 2;
        fill: none;
      }
      .thin {
        stroke: #6d4a31;
        stroke-width: 1.4;
        fill: none;
      }
    </style>
  </defs>

  <rect width="1080" height="1080" fill="url(#paper)"/>
  <rect x="54" y="54" width="972" height="972" rx="0" fill="none" stroke="#b99663" stroke-width="2" opacity="0.65"/>
  <rect x="78" y="78" width="924" height="924" rx="0" fill="none" stroke="#d8c2a1" stroke-width="1.2" opacity="0.8"/>

  <circle cx="540" cy="290" r="154" fill="#fff8ef" opacity="0.8" filter="url(#softShadow)"/>
  <path class="line" d="M386 296c44-69 118-109 204-102 58 5 107 28 143 67"/>
  <path class="thin" d="M397 317c53-57 111-81 176-76 46 4 87 20 123 50" opacity="0.55"/>

  <text x="540" y="194" text-anchor="middle" class="serif brown" font-size="52" letter-spacing="17">VILLA</text>
  <text x="540" y="314" text-anchor="middle" class="script brown" font-size="126">Dolce</text>
  <text x="540" y="376" text-anchor="middle" class="serif brown" font-size="32" letter-spacing="13">ATELIÊ</text>

  <line x1="356" y1="365" x2="465" y2="365" class="line"/>
  <line x1="616" y1="365" x2="724" y2="365" class="line"/>
  <circle cx="540" cy="423" r="7" fill="#7a4e2d"/>

  <path class="line" d="M492 475c-22-18-48-20-74-5m74 5c-27 12-49 13-72 1"/>
  <path class="line" d="M588 475c22-18 48-20 74-5m-74 5c27 12 49 13 72 1"/>
  <circle cx="540" cy="478" r="4" fill="#9b7545"/>

  <text x="540" y="610" text-anchor="middle" class="serif brown" font-size="54" letter-spacing="2">Presentes com significado</text>
  <text x="540" y="667" text-anchor="middle" class="sans brown" font-size="28" letter-spacing="1.2">cestas afetivas e delícias artesanais</text>

  <g transform="translate(218 725)">
    <rect x="0" y="0" width="644" height="112" rx="0" fill="#3c2619"/>
    <text x="322" y="48" text-anchor="middle" class="serif" font-size="30" fill="#fff7ec" letter-spacing="2">ENCOMENDAS PERSONALIZADAS</text>
    <text x="322" y="82" text-anchor="middle" class="sans" font-size="20" fill="#e8d5ba" letter-spacing="1.6">feito com carinho para datas especiais</text>
  </g>

  <text x="540" y="907" text-anchor="middle" class="sans gold" font-size="24" letter-spacing="3">@VILLADOLCEATELIE</text>
  <text x="540" y="952" text-anchor="middle" class="serif brown" font-size="22" letter-spacing="4">CESTAS AFETIVAS &amp; DELÍCIAS ARTESANAIS</text>
</svg>
